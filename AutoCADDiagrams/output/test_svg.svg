<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1820" height="400" viewBox="0 0 1820 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666" />
    </marker>
    <style type="text/css">
            .node-rect { stroke: #333333; stroke-width: 2; }
            .node-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
            .edge-line { stroke: #666666; stroke-width: 2; fill: none; }
            .edge-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #333333; text-anchor: middle; }
            .cluster-rect { fill: #f5f5f5; stroke: #cccccc; stroke-width: 1; stroke-dasharray: 5,3; }
            .cluster-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #666666; }
            .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #333333; text-anchor: middle; }
        </style>
  </defs>
  <title>Microsoft 365 Copilot Integration Architecture</title>
  <rect width="100%" height="100%" fill="#ffffff" />
  <g id="diagram">
    <text x="910" y="30" class="title-text">Microsoft 365 Copilot Integration Architecture</text>
    <g id="clusters">
      <g id="cluster-0">
        <rect x="20" y="50" width="400" height="140" rx="5" ry="5" class="cluster-rect" />
        <text x="30" y="65" class="cluster-text">User Interface</text>
      </g>
      <g id="cluster-1">
        <rect x="480" y="50" width="600" height="140" rx="5" ry="5" class="cluster-rect" />
        <text x="490" y="65" class="cluster-text">Microsoft 365</text>
      </g>
      <g id="cluster-2">
        <rect x="1140" y="50" width="200" height="140" rx="5" ry="5" class="cluster-rect" />
        <text x="1150" y="65" class="cluster-text">Azure AI</text>
      </g>
      <g id="cluster-3">
        <rect x="1400" y="50" width="400" height="140" rx="5" ry="5" class="cluster-rect" />
        <text x="1410" y="65" class="cluster-text">Power Platform</text>
      </g>
    </g>
    <g id="edges">
      <g id="edge-0">
        <line x1="190" y1="130" x2="245" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="220" y="120" class="edge-text">interacts via</text>
      </g>
      <g id="edge-1">
        <line x1="390" y1="130" x2="505" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="450" y="120" class="edge-text">sends query</text>
      </g>
      <g id="edge-2">
        <line x1="650" y1="130" x2="705" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="680" y="120" class="edge-text">requests data</text>
      </g>
      <g id="edge-3">
        <line x1="850" y1="130" x2="905" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="880" y="120" class="edge-text">fetches documents</text>
      </g>
      <g id="edge-4">
        <line x1="650" y1="130" x2="1165" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="910" y="120" class="edge-text">processes query</text>
      </g>
      <g id="edge-5">
        <line x1="1310" y1="130" x2="505" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="910" y="120" class="edge-text">returns response</text>
      </g>
      <g id="edge-6">
        <line x1="1050" y1="130" x2="1425" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="1240" y="120" class="edge-text">triggers workflow</text>
      </g>
      <g id="edge-7">
        <line x1="1570" y1="130" x2="1625" y2="130" class="edge-line" marker-end="url(#arrowhead)" />
        <text x="1600" y="120" class="edge-text">stores metadata</text>
      </g>
    </g>
    <g id="nodes">
      <g id="node-0">
        <rect x="53" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="50" y="100" width="140" height="60" rx="8" ry="8" fill="#FFB900" class="node-rect" />
        <text x="120" y="130" class="node-text">User</text>
      </g>
      <g id="node-1">
        <rect x="253" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="250" y="100" width="140" height="60" rx="8" ry="8" fill="#6264A7" class="node-rect" />
        <text x="320" y="130" class="node-text">Teams</text>
      </g>
      <g id="node-2">
        <rect x="513" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="510" y="100" width="140" height="60" rx="8" ry="8" fill="#6264A7" class="node-rect" />
        <text x="580" y="130" class="node-text">M365 Copilot</text>
      </g>
      <g id="node-3">
        <rect x="713" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="710" y="100" width="140" height="60" rx="8" ry="8" fill="#0078D4" class="node-rect" />
        <text x="780" y="130" class="node-text">Graph API</text>
      </g>
      <g id="node-4">
        <rect x="913" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="910" y="100" width="140" height="60" rx="8" ry="8" fill="#038387" class="node-rect" />
        <text x="980" y="130" class="node-text">SharePoint</text>
      </g>
      <g id="node-5">
        <rect x="1173" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="1170" y="100" width="140" height="60" rx="8" ry="8" fill="#0078D4" class="node-rect" />
        <text x="1240" y="130" class="node-text">Azure OpenAI</text>
      </g>
      <g id="node-6">
        <rect x="1433" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="1430" y="100" width="140" height="60" rx="8" ry="8" fill="#0066FF" class="node-rect" />
        <text x="1500" y="130" class="node-text">Power Automate</text>
      </g>
      <g id="node-7">
        <rect x="1633" y="103" width="140" height="60" rx="8" ry="8" fill="#00000022" />
        <rect x="1630" y="100" width="140" height="60" rx="8" ry="8" fill="#742774" class="node-rect" />
        <text x="1700" y="130" class="node-text">Dataverse</text>
      </g>
    </g>
  </g>
</svg>